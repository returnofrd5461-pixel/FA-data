<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사원별 통산유지율 분석 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f0efe9;color:#1a1a18;font-size:14px}
.ph{background:#1a1a18;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px}
.ph-l{min-width:0}.ph h1{font-size:15px;font-weight:500}.ph .sub{font-size:11px;color:#888;margin-top:2px}
.ph-r{display:flex;gap:8px;align-items:center;flex-shrink:0}
.vtog{display:flex;background:rgba(255,255,255,.12);border-radius:6px;padding:2px;gap:2px}
.vtbtn{padding:5px 13px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.65);font-family:inherit;transition:all .15s;white-space:nowrap}
.vtbtn.on{background:#fff;color:#1a1a18}
.btn-dl{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-dl:hover{background:rgba(255,255,255,.25)}
.ctrl{background:#fff;border-bottom:1px solid #e0dfd8;padding:11px 24px;display:flex;flex-direction:column;gap:8px}
.cr{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cl{font-size:11px;font-weight:500;color:#73726c;min-width:56px;flex-shrink:0}
.divv{width:1px;height:16px;background:#d3d1c7;margin:0 1px;flex-shrink:0}
.tbtn{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #d3d1c7;background:#f5f4f0;color:#5f5e5a;transition:all .12s}
.tbtn.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.qbtn{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #d3d1c7;background:#f5f4f0;color:#5f5e5a;transition:all .12s}
.qbtn.on{background:#378add;color:#fff;border-color:#378add}
.mbtn{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #d3d1c7;background:#f5f4f0;color:#5f5e5a;transition:all .12s}
.mbtn.on{color:#fff;border-color:transparent}
.mbtn.on.m01{background:#185fa5}.mbtn.on.m02{background:#0f6e56}.mbtn.on.m03{background:#854f0b}
.mbtn.on.m10{background:#3c3489}.mbtn.on.m11{background:#993c1d}.mbtn.on.m12{background:#72243e}
.period-badge{font-size:11px;color:#73726c;padding:2px 8px;border-radius:4px;background:#f0efe9;border:0.5px solid #d3d1c7;white-space:nowrap}
.lfbtn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #d3d1c7;background:#f5f4f0;color:#5f5e5a;transition:all .12s}
.lfbtn.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.lfbtn.on.lf-has{background:#a32d2d;border-color:#a32d2d}
.lfbtn.on.lf-no{background:#3b6d11;border-color:#3b6d11}
.cbtn{padding:3px 9px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid #d3d1c7;background:#fff;color:#5f5e5a}
.cbtn:hover{background:#f5f4f0}
.sort-sel{padding:4px 9px;border-radius:6px;font-size:11px;border:1px solid #d3d1c7;background:#fff;color:#1a1a18;cursor:pointer}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #d3d1c7;background:#f5f4f0;color:#5f5e5a;user-select:none;transition:all .12s}
.pill.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.pill.dimmed{background:#fafaf8;color:#d8d6cf;border:1px dashed #e8e7e1}
.pill.dimmed:hover{color:#a09e95;border-color:#d3d1c7;border-style:solid}
.pill.dimmed.on{background:#a09e95;color:#fff;border:1px solid #a09e95}
.sumbar{background:#fff;border-bottom:1px solid #e0dfd8;padding:9px 24px;display:flex;gap:16px;overflow-x:auto}
.si{display:flex;flex-direction:column;min-width:fit-content}
.si .v{font-size:16px;font-weight:500;line-height:1.1}.si .l{font-size:10px;color:#73726c;margin-top:3px}
.sdiv{width:1px;background:#e0dfd8;align-self:stretch;margin:0 1px}
.main{padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(560px,1fr));gap:16px}
.card{background:#fff;border-radius:10px;border:0.5px solid #e0dfd8;overflow:hidden}
.ch{padding:13px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid #f0efe9}
.cname{font-size:15px;font-weight:500}.csub{font-size:11px;color:#73726c;margin-top:2px}
.cbadges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;align-items:center;margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 7px;border-radius:4px;font-size:11px;font-weight:500}
.b-up{background:#eaf3de;color:#3b6d11}.b-dn{background:#fcebeb;color:#a32d2d}.b-flat{background:#f5f4f0;color:#5f5e5a}
.b-g{background:#eaf3de;color:#3b6d11}.b-b{background:#e6f1fb;color:#185fa5}.b-w{background:#faeeda;color:#854f0b}.b-r{background:#fcebeb;color:#a32d2d}
.ckpis{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #f0efe9}
.kpi{padding:10px 12px;border-right:0.5px solid #f0efe9}.kpi:last-child{border-right:none}
.kpi .kv{font-size:17px;font-weight:500;line-height:1}.kpi .kl{font-size:10px;color:#73726c;margin-top:3px}
.ccharts{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #f0efe9}
.cw{padding:11px 13px;border-right:0.5px solid #f0efe9}.cw:last-child{border-right:none}
.ct{font-size:10px;font-weight:500;color:#73726c;letter-spacing:.03em;margin-bottom:7px}
.cwrap{position:relative;width:100%;height:108px}
.cwrap canvas{display:block;width:100%!important;height:108px!important}
.ctrend{padding:9px 16px;background:#f9f8f5;display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px;color:#5f5e5a;border-bottom:1px solid #f0efe9}
.tm{display:flex;align-items:center;gap:3px}.tr{font-weight:500;font-size:12px}.ta{color:#c0bfba;font-size:11px}
.lost-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:#fff}
.lost-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:#5f5e5a}
.lost-title .dot{width:6px;height:6px;border-radius:50%}
.lost-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lchip{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.lc-none{background:#f1efe8;color:#73726c}
.lost-bd{border-top:1px solid #f0efe9}
.lost-ph{padding:7px 16px 3px;font-size:10px;font-weight:500;color:#73726c;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid #f0efe9;display:flex;align-items:center;gap:6px}
.lost-ph .pchip{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;text-transform:none;letter-spacing:0}
.lost-ph .psub{font-size:11px;font-weight:400;color:#a09f98;text-transform:none;letter-spacing:0}
table.lt{width:100%;border-collapse:collapse;font-size:11px}
table.lt th{padding:6px 10px;text-align:left;font-size:10px;font-weight:500;color:#73726c;background:#faf9f7;border-bottom:0.5px solid #f0efe9;white-space:nowrap}
table.lt td{padding:6px 10px;border-bottom:0.5px solid #f5f4f0;color:#1a1a18;vertical-align:middle}
table.lt tr:last-child td{border-bottom:none}
table.lt tr:hover td{background:#fdf9f9}
.lt .amt{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.lt .pr{font-size:10px;color:#73726c;margin-top:1px}
.st-eff{display:inline-flex;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;background:#fcebeb;color:#a32d2d}
.st-can{display:inline-flex;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;background:#faeeda;color:#854f0b}
.lost-empty{padding:12px 16px;font-size:11px;color:#a09f98;text-align:center;background:#faf9f7}
.lost-period-block{background:#fff}
.lost-period-block--sep{border-top:3px solid #e8e7e1;margin-top:0}
.lost-period-block--sep .lost-ph{background:#f5f4f0}
.rank-panel{background:#fff;border-radius:10px;border:0.5px solid #e0dfd8;overflow:hidden;margin-bottom:16px}
.rank-panel-hd{padding:14px 18px 10px;border-bottom:1px solid #f0efe9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.rank-panel-title{font-size:13px;font-weight:500}.rank-panel-sub{font-size:11px;color:#73726c;margin-top:2px}
.rank-chart-area{padding:16px 18px}
table.rtbl{width:100%;border-collapse:collapse;font-size:12px}
table.rtbl th{padding:9px 12px;text-align:left;font-size:11px;font-weight:500;color:#73726c;background:#f9f8f5;border-bottom:1px solid #e0dfd8;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
table.rtbl th:hover{color:#1a1a18;background:#f0efe9}
table.rtbl th .si2{font-size:9px;margin-left:3px;opacity:.5}
table.rtbl th.asc{color:#1a1a18}.table.rtbl th.asc .si2{opacity:1}
table.rtbl td{padding:9px 12px;border-bottom:0.5px solid #f0efe9;vertical-align:middle}
table.rtbl tr:hover td{background:#faf9f7}
table.rtbl tr:last-child td{border-bottom:none}
.rtbl .rnum{text-align:center;color:#a09f98;font-size:11px;width:28px}
.rtbl .rname{font-weight:500;font-size:13px}.rtbl .rsub{font-size:10px;margin-top:2px}
.rtbl .rbar-wrap{min-width:90px;position:relative;height:20px;background:#f5f4f0;border-radius:3px;overflow:hidden}
.rtbl .rbar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;min-width:36px}
.rtbl .rmonth{font-size:11px;font-weight:500;white-space:nowrap}
.rtbl .rdiff{font-size:11px;font-weight:500;white-space:nowrap}
.rtbl .rnum-cell{text-align:center;font-size:12px;font-variant-numeric:tabular-nums}
.rtbl .lost-cnt{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.rtbl .amt{text-align:right;font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}
.rank-tbl-wrap{overflow-x:auto;max-height:640px;overflow-y:auto}
.empty{text-align:center;padding:60px 20px;color:#a09f98}

/* ── 성과 섹션 구분선 (카드 내) ── */
.perf-divider{display:flex;align-items:center;justify-content:space-between;padding:9px 16px 8px;background:linear-gradient(135deg,#eef5ff 0%,#f0f9f5 100%);border-top:2px solid #185fa5;margin-top:0}
.perf-divider-left{display:flex;align-items:center;gap:8px}
.perf-divider-icon{font-size:14px}
.perf-divider-title{font-size:12px;font-weight:600;color:#185fa5;letter-spacing:.02em}
.perf-chips{display:flex;gap:5px;flex-wrap:wrap}
.pchip2{font-size:11px;padding:2px 7px;border-radius:12px;font-weight:500}
.perf-body{background:#fff}
.perf-kpis{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #f0efe9}
.perf-kpi{padding:9px 12px;border-right:0.5px solid #f0efe9}
.perf-kpi:last-child{border-right:none}
.perf-kpi .pv{font-size:16px;font-weight:500;line-height:1}
.perf-kpi .pl{font-size:10px;color:#73726c;margin-top:3px}
.perf-charts{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #f0efe9}
.perf-cw{padding:11px 13px;border-right:0.5px solid #f0efe9}
.perf-cw:last-child{border-right:none}
.perf-ct{font-size:10px;font-weight:500;color:#73726c;letter-spacing:.03em;margin-bottom:7px}
.perf-cwrap{position:relative;width:100%;height:96px}
.perf-cwrap canvas{display:block;width:100%!important;height:96px!important}
.perf-bottom{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f0efe9;gap:0}
.perf-portfolio{padding:10px 14px;border-right:0.5px solid #f0efe9}
.perf-products{padding:10px 14px}
.portfolio-bar{display:flex;height:14px;border-radius:4px;overflow:hidden;margin-bottom:5px}
.portfolio-bar .seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#fff;transition:width .3s;min-width:0;overflow:hidden}
.portfolio-legend{display:flex;gap:8px;flex-wrap:wrap}
.pleg{display:flex;align-items:center;gap:3px;font-size:10px;color:#5f5e5a}
.pleg-dot{width:7px;height:7px;border-radius:2px}
.meta-badges{padding:8px 16px;display:flex;gap:5px;flex-wrap:wrap;background:#f5f8ff;border-top:1px solid #e6eef8}
.mbadge{font-size:11px;padding:3px 8px;border-radius:12px;font-weight:500;line-height:1.4}

/* ── 성과 독립 뷰 ── */
.perf-view-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:16px}
.perf-view-card{background:#fff;border-radius:10px;border:0.5px solid #e0dfd8;overflow:hidden}
.pvc-header{padding:13px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid #f0efe9}
.pvc-name{font-size:15px;font-weight:500}
.pvc-sub{font-size:11px;color:#73726c;margin-top:2px}
.cross-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.cb-good{background:#e6f9f0;color:#0f6e56}
.cb-warn{background:#fff3cd;color:#854f0b}
.cb-danger{background:#fcebeb;color:#a32d2d}

</style>
</head>
<body>
<div class="ph">
  <div class="ph-l"><h1>사원별 통산유지율 분석 대시보드</h1><div class="sub" id="phSub">법인전략사업단 · 25회 통산유지율 (25.4분기 + 26.1분기)</div></div>
  <div class="ph-r">
    <div class="vtog">
      <button id="vCard" class="vtbtn on" onclick="setView('card')">카드 뷰</button>
      <button id="vPerf" class="vtbtn" onclick="setView('perf')">통합 뷰</button>
    </div>
    <button class="btn-dl" id="dlHtmlBtn" onclick="downloadHtml()" style="background:rgba(99,186,125,.25);border-color:rgba(99,186,125,.5)">↓ HTML 저장</button>
    <button class="btn-dl" id="dlBtn" onclick="downloadImg()">↓ 이미지 저장</button>
    <button class="btn-dl" id="dlEachBtn" onclick="downloadEach()">↓ 개별 이미지</button>
  </div>
</div>
<div class="ctrl">
  <div class="cr"><span class="cl">팀 필터</span><div id="teamBtns" style="display:flex;gap:5px;flex-wrap:wrap"></div></div>
  <div class="cr">
    <span class="cl">상태 필터</span>
    <button class="tbtn on" id="st-all" onclick="setStatus('all')">전체</button>
    <button class="tbtn" id="st-fa" onclick="setStatus('FA')">FA</button>
    <button class="tbtn" id="st-ma" onclick="setStatus('MA')">MA</button>
  </div>
  <div class="cr">
    <span class="cl">기간 선택</span>
    <button class="qbtn" id="qAll" onclick="quickSelect('all')">전체</button>
    <button class="qbtn" id="qQ4" onclick="quickSelect('q4')">25.4분기</button>
    <button class="qbtn" id="qQ1" onclick="quickSelect('q1')">26.1분기</button>
    <button class="qbtn" id="qRecent" onclick="quickSelect('recent2')">최근2개월</button>
    <div class="divv"></div>
    <div id="monthBtns" style="display:flex;gap:5px;flex-wrap:wrap"></div>
    <div class="divv"></div>
    <span class="period-badge" id="periodBadge">—</span>
  </div>
  <div class="cr">
    <span class="cl">이탈 필터</span>
    <button class="lfbtn on" id="lf-all" onclick="setLostFilter('all')">전체</button>
    <button class="lfbtn lf-has" id="lf-has" onclick="setLostFilter('has_lost')">이탈 있음</button>
    <button class="lfbtn lf-no" id="lf-no" onclick="setLostFilter('no_lost')">이탈 없음</button>
  </div>
  <div class="cr">
    <span class="cl">등급 필터</span>
    <button class="tbtn on" id="gr-all" onclick="setGrade('all')">전체</button>
    <button class="tbtn" id="gr-s" onclick="setGrade('s')" style="border-color:#3b6d11;color:#3b6d11">S등급 95%↑</button>
    <button class="tbtn" id="gr-a" onclick="setGrade('a')" style="border-color:#185fa5;color:#185fa5">A등급 90-95%</button>
    <button class="tbtn" id="gr-b" onclick="setGrade('b')" style="border-color:#854f0b;color:#854f0b">B등급 80-90%</button>
    <button class="tbtn" id="gr-c" onclick="setGrade('c')" style="border-color:#a32d2d;color:#a32d2d">C등급 80%↓</button>
    <button class="tbtn" id="gr-n" onclick="setGrade('n')" style="border-color:#73726c;color:#73726c">데이터 부족</button>
  </div>
  <div class="cr">
    <span class="cl">사원 선택</span>
    <button class="cbtn" onclick="selectAll()">전체 선택</button>
    <button class="cbtn" onclick="clearAll()">전체 해제</button>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="name">이름순</option>
      <option value="rate_d">유지율 높은순</option>
      <option value="rate_a">유지율 낮은순</option>
      <option value="drop">하락폭 큰순</option>
      <option value="cnt">계약건수순</option>
      <option value="lost">이탈건수순</option>
    </select>
  </div>
  <div class="cr"><span class="cl"></span><div class="pills" id="pillsWrap"></div></div>
</div>
<div class="sumbar" id="sumbar"></div>
<div class="main" id="captureArea">
  <div id="cardViewArea">
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none"><div style="font-size:32px">📋</div><p style="font-size:13px;margin-top:8px">사원을 선택하면 분석 카드가 나타납니다</p></div>
  </div>

  <div id="perfViewArea" style="display:none"><div id="perfContent"></div></div>
</div>
<script>
let D;
let LOST;
const MONTH_ORDER={'10':0,'11':1,'12':2,'01':3,'02':4,'03':5,'04':6,'05':7,'06':8,'07':9,'08':10,'09':11};
let PERF;
let TARGET;
const ML_MAP={'01':'26.1월','02':'26.2월','03':'26.3월','04':'26.4월','05':'26.5월','06':'26.6월','07':'26.7월','08':'26.8월','09':'26.9월','10':'25.10월','11':'25.11월','12':'25.12월'};
const TC={'Team 0':'#e6f1fb','Team 1':'#e1f5ee','Team 2':'#faece7','Team 3':'#faeeda','Team 4':'#eaf3de','강서지사':'#eeedfe','서울지사':'#fbeaf0','기타':'#f1efe8'};
const TT={'Team 0':'#0c447c','Team 1':'#085041','Team 2':'#993c1d','Team 3':'#633806','Team 4':'#27500a','강서지사':'#3c3489','서울지사':'#72243e','기타':'#444441'};
const LOST_CHIP={'01_02':'background:#faeeda;color:#633806','02_03':'background:#fcebeb;color:#a32d2d','10_11':'background:#eeedfe;color:#3c3489','11_12':'background:#e1f5ee;color:#085041'};
let AVAIL_MONTHS;
let selMonths,sel,curTeam='전체',curStatus='all',lostFilter='all',curGrade='all',viewMode='card',charts={},rankSortCol='rate',rankSortDir='desc',perfSortCol='perf',perfSortDir='desc';
let ACT={}; // 활동량 데이터 {FA명: {월: 건수}}

function actMths(){return AVAIL_MONTHS.filter(m=>selMonths.has(m));}
function latestM(){const a=actMths();return a.length?a[a.length-1]:null;}
function lr(d){if(!d||!d.months)return null;for(const m of[...actMths()].reverse())if(d.months[m]?.rate_25!=null)return d.months[m].rate_25;return null;}
function fr(d){if(!d||!d.months)return null;for(const m of actMths())if(d.months[m]?.rate_25!=null)return d.months[m].rate_25;return null;}
function chg(d){const l=lr(d),f=fr(d);return(l!=null&&f!=null)?l-f:null;}
function lmd(d){if(!d||!d.months)return{};for(const m of[...actMths()].reverse())if(d.months[m]&&d.months[m].total_contracts)return d.months[m];return{};}
function rc(r){if(r==null)return'#5f5e5a';if(r>=95)return'#3b6d11';if(r>=85)return'#185fa5';if(r>=70)return'#854f0b';return'#a32d2d';}
function fmtW(n){if(!n&&n!==0)return'—';return Math.round(n/10000).toLocaleString()+'만';}

// ─── 위험도 배지: 실효 vs 해지 구분 ───
function riskBadge(round,status){
  if(!round)return`<span style="color:#73726c;font-size:10px">—</span>`;
  let bg,color,label;
  if(status==='실효'){
    if(round<=13){bg='#fcebeb';color='#a32d2d';label=`${round}회 · 부활필수`;}
    else if(round<=25){bg='#faeeda';color='#854f0b';label=`${round}회 · 고객관리강화`;}
    else{bg='#f1efe8';color='#5f5e5a';label=`${round}회`;}
  }else{
    if(round<=7){bg='#fcebeb';color='#a32d2d';label=`${round}회 · 매우위험`;}
    else if(round<=13){bg='#faeeda';color='#633806';label=`${round}회 · 위험`;}
    else if(round<=18){bg='#fff8e1';color='#854f0b';label=`${round}회 · 주의`;}
    else if(round<=25){bg='#e6f1fb';color='#185fa5';label=`${round}회 · 고객관리강화`;}
    else{bg='#f1efe8';color='#5f5e5a';label=`${round}회`;}
  }
  return`<span style="background:${bg};color:${color};padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap">${label}</span>`;
}

// ─── 이탈 기간 활성 여부 (단일월 지원) ───
function lostPeriodActive(k){
  const to=k.split('_')[1].padStart(2,'0');
  return selMonths.has(to);
}
function sortPeriodKeys(keys){return[...keys].sort((a,b)=>{const fa=a.split('_')[0].padStart(2,'0'),fb=b.split('_')[0].padStart(2,'0');return(MONTH_ORDER[fa]??99)-(MONTH_ORDER[fb]??99);});}
function lostPeriodLabel(k){const to=k.split('_')[1].padStart(2,'0');return ML_MAP[to]||to+'월';}
function hasLost(n){const L=LOST[n]||{};return Object.keys(L).filter(k=>lostPeriodActive(k)).some(k=>L[k].length>0);}
function totalLostN(n){const L=LOST[n]||{};return Object.entries(L).filter(([k])=>lostPeriodActive(k)).reduce((s,[,v])=>s+v.length,0);}
function totalLostPerf(n){const L=LOST[n]||{};return Object.entries(L).filter(([k])=>lostPeriodActive(k)).flatMap(([,v])=>v).reduce((s,x)=>s+x.first_perf,0);}

const ALL_TEAMS=['전체','Team 0','Team 1','Team 2','Team 3','Team 4','강서지사','서울지사'];
// PERF에만 있는 사람을 위해 D에 placeholder 자동 생성 (fetch / 인라인 init 양쪽에서 호출)
function ensureDPlaceholders(){
  Object.keys(PERF||{}).forEach(n=>{
    if(!D[n]){
      D[n]={
        name:n,
        team:PERF[n].team||'기타',
        status:PERF[n].status||'FA',
        months:{}
      };
    }
  });

// D ∪ PERF 합집합. D 우선, PERF에만 있으면 빈 months 가진 가상 객체 생성
function allFAs(){
  const out=[]; const seen=new Set();
  Object.values(D).forEach(d=>{ if(seen.has(d.name))return; seen.add(d.name); out.push(d); });
  Object.keys(PERF||{}).forEach(name=>{
    if(seen.has(name))return; seen.add(name);
    const p=PERF[name];
    out.push({name, team: p.team||'기타', status: p.status||'FA', months:{}});
  });
  return out;
}
function filteredList(){
  return allFAs().filter(d=>{
    if(curTeam!=='전체'&&d.team!==curTeam) return false;
    if(curStatus!=='all'){
      const st=d.status||PERF[d.name]?.status||'FA';
      if(st!==curStatus) return false;
    }
    return true;
  });
}
// pill dimmed 판정 + sortedFiltered 공통 매칭 (팀+상태+이탈+등급)
function passesFilters(d){
  if(curTeam!=='전체'&&d.team!==curTeam) return false;
  if(curStatus!=='all'){
    const st=d.status||PERF[d.name]?.status||'FA';
    if(st!==curStatus) return false;
  }
  if(lostFilter==='has_lost'&&!hasLost(d.name)) return false;
  if(lostFilter==='no_lost'&&hasLost(d.name)) return false;
  if(curGrade!=='all'&&getGrade(d)!==curGrade) return false;
  return true;
}
function setGrade(g){
  curGrade=g;
  ['all','s','a','b','c','n'].forEach(x=>{
    const el=document.getElementById('gr-'+x);
    if(el){el.classList.toggle('on',x===g);if(x!=='all'&&x===g){el.style.background=el.style.borderColor;el.style.color='#fff';}else if(x!=='all'){el.style.background='#f5f4f0';}}
  });
  render();
}
function setStatus(s){
  curStatus=s;
  document.getElementById('st-all').classList.toggle('on',s==='all');
  document.getElementById('st-fa').classList.toggle('on',s==='FA');
  document.getElementById('st-ma').classList.toggle('on',s==='MA');
  buildPills();render();
}
function getGrade(d){
  const r=lr(d);
  if(r==null) return 'n';
  if(r>=95) return 's';
  if(r>=90) return 'a';
  if(r>=80) return 'b';
  return 'c';
}
function sortedFiltered(){
  const s=document.getElementById('sortSel').value;
  let list=allFAs().filter(d=>sel.has(d.name)&&passesFilters(d));
  return list.sort((a,b)=>{
    if(s==='name')return a.name.localeCompare(b.name,'ko');
    if(s==='rate_d')return(lr(b)??-1)-(lr(a)??-1);
    if(s==='rate_a')return(lr(a)??999)-(lr(b)??999);
    if(s==='drop')return(chg(a)??0)-(chg(b)??0);
    if(s==='cnt')return(lmd(b).total_contracts||0)-(lmd(a).total_contracts||0);
    if(s==='lost')return totalLostN(b.name)-totalLostN(a.name);
    return 0;
  });
}

function perfOfMths(name) {
  const p=PERF[name]; if(!p) return null;
  const aM=actMths();
  const cnt=aM.reduce((s,m)=>s+(p.months[m]?.cnt||0),0);
  const perf=aM.reduce((s,m)=>s+(p.months[m]?.perf||0),0);
  const prem=aM.reduce((s,m)=>s+(p.months[m]?.prem||0),0);
  const hwan=aM.reduce((s,m)=>s+(p.months[m]?.hwan||0),0);
  const life=aM.reduce((s,m)=>s+(p.months[m]?.life||0),0);
  const nonlife=aM.reduce((s,m)=>s+(p.months[m]?.nonlife||0),0);
  const lost=aM.reduce((s,m)=>s+((p.months[m]?.status?.해지||0)+(p.months[m]?.status?.실효||0)),0);
  const delay=aM.reduce((s,m)=>s+(p.months[m]?.status?.유예||0),0);
  const products={};
  aM.forEach(m=>{Object.entries(p.months[m]?.products||{}).forEach(([k,v])=>{products[k]=(products[k]||0)+v;});});
  const topProds=Object.entries(products).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const q4p=p.totals.q4_perf||0,q1p=p.totals.q1_perf||0;
  const growth=q4p>0?Math.round((q1p-q4p)/q4p*100):null;
  return {cnt,perf,prem,hwan,life,nonlife,lost,delay,topProds,growth,
          lifeRatio:cnt>0?Math.round(life/cnt*100):0,
          lostRate:cnt>0?+(lost/cnt*100).toFixed(1):0,
          avgPerf:cnt>0?Math.round(perf/cnt):0};
}

// 메타 배지 계산 (장점 + 단점 + 교차분석)
function metaBadges(name, pd) {
  if(!pd||pd.cnt===0) return [];
  const ret=lr(D[name]);
  const p=PERF[name];
  const aM=actMths();
  const badges=[];

  // ── 실적 랭킹 ──
  const allPerfs=Object.entries(PERF).map(([n,ap])=>({n,v:ap.totals.perf})).filter(x=>x.v>0);
  allPerfs.sort((a,b)=>b.v-a.v);
  const rank=allPerfs.findIndex(x=>x.n===name)+1;
  const topPct=rank>0?rank/allPerfs.length:1;
  if(topPct<=0.1) badges.push({label:'🏆 실적 1위권 TOP'+rank, bg:'#fef4e0', color:'#7a4500', type:'pos'});
  else if(topPct<=0.25) badges.push({label:'🥇 실적 상위 TOP'+rank, bg:'#fef9ec', color:'#854f0b', type:'pos'});

  // ── 성장성 ──
  if(pd.growth!==null){
    if(pd.growth>=100) badges.push({label:`🚀 폭발성장(25.4Q→26.1Q) +${pd.growth}%`, bg:'#e6f9f0', color:'#0f6e56', type:'pos'});
    else if(pd.growth>=50) badges.push({label:`📈 고성장(25.4Q→26.1Q) +${pd.growth}%`, bg:'#eaf3de', color:'#3b6d11', type:'pos'});
    else if(pd.growth<=-50) badges.push({label:`📉 급감(25.4Q→26.1Q) ${pd.growth}%`, bg:'#fcebeb', color:'#a32d2d', type:'neg'});
    else if(pd.growth<=-25) badges.push({label:`📉 하락(25.4Q→26.1Q) ${pd.growth}%`, bg:'#fff0f0', color:'#c45050', type:'neg'});
  }

  // ── 포트폴리오 품질 ──
  if(pd.lifeRatio>=80&&pd.cnt>=10) badges.push({label:'📌 생보 전문가 '+pd.lifeRatio+'%', bg:'#eeedfe', color:'#3c3489', type:'pos'});
  else if(pd.lifeRatio>=60&&pd.lostRate<=2&&pd.cnt>=10) badges.push({label:'🎯 생손 균형형', bg:'#e6f1fb', color:'#185fa5', type:'pos'});
  if(pd.nonlife/(pd.cnt||1)>=0.8&&pd.cnt>=10) badges.push({label:'🏗 손보 편중 '+(100-pd.lifeRatio)+'%', bg:'#faeeda', color:'#633806', type:'neg'});

  // ── 건당 단가 ──
  if(pd.avgPerf>=1000000) badges.push({label:`💎 초고단가 건당 ${fmtW(pd.avgPerf)}`, bg:'#f5f0ff', color:'#5b21b6', type:'pos'});
  else if(pd.avgPerf>=500000) badges.push({label:`⚡ 고단가 건당 ${fmtW(pd.avgPerf)}`, bg:'#eeedfe', color:'#3c3489', type:'pos'});
  else if(pd.avgPerf<100000&&pd.cnt>=10) badges.push({label:`💸 저단가 건당 ${fmtW(pd.avgPerf)}`, bg:'#f5f4f0', color:'#73726c', type:'neg'});

  // ── 계약 안정성 ──
  if(pd.lostRate===0&&pd.cnt>=10) badges.push({label:'🛡 조기이탈 0% 완벽', bg:'#eaf3de', color:'#3b6d11', type:'pos'});
  else if(pd.lostRate>=10) badges.push({label:`🚨 조기이탈 ${pd.lostRate}% 위험`, bg:'#fcebeb', color:'#a32d2d', type:'neg'});
  else if(pd.lostRate>=5) badges.push({label:`⚠️ 조기이탈 ${pd.lostRate}%`, bg:'#fff0f0', color:'#c45050', type:'neg'});
  if(pd.delay>=5) badges.push({label:`⏰ 유예 ${pd.delay}건 점검필요`, bg:'#fff8e1', color:'#854f0b', type:'neg'});

  // ── 활동 균등성 ──
  const activeMths=aM.filter(m=>p&&p.months[m]&&p.months[m].cnt>0).length;
  if(activeMths===aM.length&&aM.length>=3&&pd.cnt>=15)
    badges.push({label:'🔄 전월 꾸준한 활동', bg:'#e6f9f0', color:'#0f6e56', type:'pos'});
  if(activeMths<=1&&aM.length>=3)
    badges.push({label:'⏸ 활동월 집중 ('+activeMths+'개월)', bg:'#f5f4f0', color:'#73726c', type:'neg'});

  // ── 유지율 교차 분석 ──
  if(ret!=null){
    if(ret>=90&&pd.perf>=5000000) badges.push({label:'✅ 모집·유지 모두 우수', bg:'#e6f9f0', color:'#0f6e56', type:'cross'});
    else if(ret<85&&pd.cnt>=20) badges.push({label:'⚠️ 고모집-저유지 점검', bg:'#fcebeb', color:'#a32d2d', type:'cross'});
    else if(ret>=90&&topPct>0.6) badges.push({label:'🔍 유지 우수 · 모집 확대 여지', bg:'#fff8e1', color:'#854f0b', type:'cross'});
    else if(ret<80&&pd.lostRate>=5) badges.push({label:'🚩 유지·이탈 복합 위험', bg:'#fcebeb', color:'#7a0000', type:'cross'});
  }

  // ── 목표/활동 분석 (TARGET 데이터 있을 때만) ──
  const td=targetOfMths(name);
  if(td&&td.anyMonthHasData){
    if(td.ach!=null&&td.ach>=110)
      badges.push({label:`🎯 목표초과달성 +${(td.ach-100).toFixed(0)}%`, bg:'#e6f9f0', color:'#0f6e56', type:'pos'});
    else if(td.ach!=null&&td.ach<70)
      badges.push({label:`⚠️ 목표미달 ${td.ach.toFixed(0)}%`, bg:'#fcebeb', color:'#a32d2d', type:'neg'});
    if(td.dbUse!=null&&td.dbUse<30&&td.db>0)
      badges.push({label:'📋 DB 활용 부진', bg:'#fff3cd', color:'#854f0b', type:'neg'});
  }

  return badges;
}

// ─── 활동/목표 헬퍼 ─────────────────────────────────
function targetOfMths(name) {
  const t=TARGET&&TARGET[name];
  if(!t) return null;
  const aM=actMths();
  let db=0,act=0,goal=0,anyMonthHasData=false;
  aM.forEach(m=>{
    const v=t[m];if(!v)return;
    db+=v.db||0; act+=v.act||0; goal+=v.goal||0;
    if((v.db||0)||(v.act||0)||(v.goal||0)) anyMonthHasData=true;
  });
  // 목표달성률은 월납보험료(prem) 기준 (인정실적이 아닌 보험 실무 기준)
  const premSum=aM.reduce((s,m)=>s+(PERF[name]?.months[m]?.prem||0),0);
  const ach=goal>0?(premSum/goal*100):null;
  const dbUse=db>0?(act/db*100):null;
  return {db,act,goal,premSum,ach,dbUse,anyMonthHasData,
          avgDb:aM.length?Math.round(db/aM.length):0,
          avgAct:aM.length?Math.round(act/aM.length):0};
}

// 성과 차트 플러그인 (데이터 레이블)
const cntLabelPlugin={id:'cntLbl',afterDatasetsDraw(chart){
  const{ctx,chartArea:ca}=chart;if(!ca)return;
  ctx.save();ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillStyle='#185fa5';
  chart.getDatasetMeta(0).data.forEach((bar,i)=>{
    const v=chart.data.datasets[0].data[i];if(!v)return;
    const bH=Math.abs(bar.base-bar.y);
    if(bH>=14){ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText(v,bar.x,bar.y+bH/2);}
    else{ctx.fillStyle='#185fa5';ctx.fillText(v,bar.x,Math.max(ca.top+9,bar.y-3));}
  });
  ctx.restore();
}};
const premLabelPlugin2={id:'premLbl2',afterDatasetsDraw(chart){
  const{ctx,chartArea:ca}=chart;if(!ca)return;
  ctx.save();ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.9)';
  chart.getDatasetMeta(0).data.forEach((bar,i)=>{
    const v=chart.data.datasets[0].data[i];if(!v)return;
    const bH=Math.abs(bar.base-bar.y);
    if(bH>=14){ctx.fillText(v.toLocaleString(),bar.x,bar.y+bH/2);}

  });

}};
const perfLabelPlugin2={id:'perfLbl2',afterDatasetsDraw(chart){

// 외활(초록) 막대 레이블
const actLabelPlugin={id:'actLbl',afterDatasetsDraw(chart){

// 마감목표 단일 차트: 막대 안에 목표 숫자, 차트 영역 바깥(위쪽 padding)에 달성률 %
const goalAchLabelPlugin={id:'goalAchLbl',afterDatasetsDraw(chart){
  const{ctx,chartArea:ca,data}=chart;if(!ca)return;
  const opts=chart.options.plugins&&chart.options.plugins.goalAchLbl||{};
  const perfArr=opts.perfData||[];
  const goalMeta=chart.getDatasetMeta(0);
  if(!goalMeta)return;
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  goalMeta.data.forEach((bar,i)=>{
    const goal=data.datasets[0].data[i]||0;
    const perf=perfArr[i]||0;
    if(!goal&&!perf)return;
    const bH=Math.abs(bar.base-bar.y);
    // 막대 안: 목표 숫자 (변경 X)
    if(goal>0){
      ctx.font='bold 11px sans-serif';
      if(bH>=18){ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillText(goal.toLocaleString(),bar.x,bar.y+bH/2);}
      else{ctx.fillStyle='#854f0b';ctx.fillText(goal.toLocaleString(),bar.x,Math.max(ca.top+13,bar.y-3));}
    }
    // 차트 영역 "바깥 위쪽" padding 영역에 달성률 % — 모든 막대 동일 높이 가로 정렬
    const ach=goal>0?(perf/goal*100):null;
    if(ach!=null){
      ctx.font='bold 11px sans-serif';
      ctx.fillStyle=achColor(ach);
      ctx.fillText(ach.toFixed(0)+'%',bar.x,ca.top-12);
    }
  });
  ctx.restore();
}};

// 성과 차트 그리기 (3개 독립 차트)
function drawPerfCharts(d) {
  const p=PERF[d.name];if(!p)return;
  const id=cardId(d.name);
  const aM=actMths();
  const mL=aM.map(m=>ML_MAP[m]||m);
  const mkBar=(cid,data,bg,plugin,fmt)=>{
    const el=document.getElementById(cid);if(!el)return;
    if(charts[cid]){try{charts[cid].destroy();}catch(e){}}
    charts[cid]=new Chart(el,{type:'bar',
      data:{labels:mL,datasets:[{data,backgroundColor:bg,borderRadius:3}]},
      plugins:[plugin],
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        devicePixelRatio:window.devicePixelRatio||2,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw?fmt(c.raw):'0'}}},
        layout:{padding:{top:20}},
        scales:{x:{grid:{display:false},ticks:{font:{size:9},color:'#73726c'}},
                y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:9},color:'#73726c'}}}}});
  };
  mkBar(`pc1${id}`,aM.map(m=>p.months[m]?.cnt||0),'rgba(55,138,221,.75)',cntLabelPlugin,v=>v+'건');
  mkBar(`pc2${id}`,aM.map(m=>Math.round((p.months[m]?.prem||0)/10000)),'rgba(186,117,23,.7)',premLabelPlugin2,v=>v+'만원');
  mkBar(`pc3${id}`,aM.map(m=>Math.round((p.months[m]?.perf||0)/10000)),'rgba(30,158,117,.7)',perfLabelPlugin2,v=>v+'만원');

  // TARGET 데이터 차트 (pc4/pc5/pc6) — 데이터 있을 때만
  const td=targetOfMths(d.name);
  if(td&&td.anyMonthHasData){
    const t=TARGET[d.name]||{};
    mkBar(`pc4${id}`,aM.map(m=>t[m]?.db||0),'#185fa5',cntLabelPlugin,v=>v+'건');
    mkBar(`pc5${id}`,aM.map(m=>t[m]?.act||0),'#0f6e56',actLabelPlugin,v=>v+'건');
    const cid='pc6'+id;
    const el=document.getElementById(cid);
    if(el){
      if(charts[cid]){try{charts[cid].destroy();}catch(e){}}
      const goalData=aM.map(m=>Math.round((t[m]?.goal||0)/10000));
      const perfData=aM.map(m=>Math.round((p.months[m]?.prem||0)/10000));
      charts[cid]=new Chart(el,{type:'bar',
        data:{labels:mL,datasets:[
          {label:'마감목표',data:goalData,backgroundColor:'#854f0b',borderRadius:3}
        ]},
        plugins:[goalAchLabelPlugin],
        options:{responsive:true,maintainAspectRatio:false,animation:false,
          devicePixelRatio:window.devicePixelRatio||2,
          plugins:{legend:{display:false},
            tooltip:{callbacks:{label:c=>'마감목표: '+c.raw.toLocaleString()+'만원'}},
            goalAchLbl:{perfData:perfData}},
          layout:{padding:{top:40,bottom:0,left:0,right:0}},
          scales:{x:{grid:{display:false},ticks:{font:{size:9},color:'#73726c'}},
                  y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:9},color:'#73726c'}}}}});
    }
  }
}

  const aM=actMths();

  let totCnt=0,totPerf=0,totHwan=0,totLife=0,totLost=0;

    const pd=perfOfMths(d.name);
    if(pd){totCnt+=pd.cnt;totPerf+=pd.perf;totHwan+=pd.hwan;totLife+=pd.life;totLost+=pd.lost;}
  });

  const avgP=totCnt>0?Math.round(totPerf/totCnt):0;
  
  // 성과 카드 그리드 (perfSortCol/Dir 적용)

    const pa=perfOfMths(a.name),pb=perfOfMths(b.name);

    if(perfSortCol==='avgact')  return ((tb?.avgAct||0)-(ta?.avgAct||0))*dir;

// ─── 차트 데이터 레이블 플러그인 ───
const rateLabelPlugin={id:'rateLabels',afterDatasetsDraw(chart){
  const{ctx,scales:{x,y},chartArea:ca}=chart;if(!x||!y||!ca)return;
  ctx.save();
  chart.data.datasets[0].data.forEach((v,i)=>{
    if(v==null)return;
    const xp=x.getPixelForValue(i),yp=y.getPixelForValue(v);
    ctx.fillStyle=v>=95?'#3b6d11':v>=85?'#185fa5':v>=70?'#854f0b':'#a32d2d';
    ctx.font='600 9px sans-serif';ctx.textAlign='center';
    // 짝수 인덱스(0,2,4)는 점 위, 홀수 인덱스(1,3,5)는 점 아래 — 라벨 겹침 회피
    const yTxt = (i%2===0)
      ? Math.max(ca.top+9, yp-11)
      : Math.min(ca.bottom-3, yp+13);
    ctx.fillText(v.toFixed(1)+'%',xp,yTxt);
  });
  ctx.restore();
}};

const statusLabelPlugin={id:'statusLabels',afterDatasetsDraw(chart){
  const{ctx}=chart;
  ctx.save();
  ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.92)';
  const nd=chart.data.datasets[0].data; // 정상
  chart.getDatasetMeta(0).data.forEach((bar,i)=>{
    const v=nd[i];if(!v||v===0)return;
    const barH=Math.abs(bar.base-bar.y);
    if(barH<14)return;
    ctx.fillText(v,bar.x,bar.y+barH/2);
  });
  ctx.restore();
}};

const premLabelPlugin={id:'premLabels',afterDatasetsDraw(chart){
  const{ctx,chartArea:ca}=chart;if(!ca)return;
  ctx.save();ctx.font='600 8px sans-serif';ctx.fillStyle='#5f5e5a';
  chart.getDatasetMeta(0).data.forEach((bar,i)=>{
    const v=chart.data.datasets[0].data[i];if(!v)return;
    const yTxt=Math.max(ca.top+6,bar.y-4);
    ctx.save();
    ctx.translate(bar.x,yTxt);
    ctx.rotate(-30*Math.PI/180);
    ctx.textAlign='left';
    ctx.fillText(v.toLocaleString()+'만',2,0);
    ctx.restore();
  });
  ctx.restore();
}};

function cardId(n){return'c'+n.split('').map(c=>c.charCodeAt(0)).join('');}

function lostSectionHTML(name){
  const L=LOST[name]||{};
  const activePeriods=sortPeriodKeys(Object.keys(L).filter(k=>lostPeriodActive(k)));
  const totalN=activePeriods.reduce((s,k)=>s+L[k].length,0);
  let chips='';
  if(!totalN){chips=`<span class="lchip lc-none">이탈 없음</span>`;}
  else{activePeriods.forEach(k=>{const n=L[k].length;if(!n)return;const p=L[k].reduce((s,x)=>s+x.first_perf,0);const st=LOST_CHIP[k]||'background:#f1efe8;color:#444441';chips+=`<span class="lchip" style="${st}">${lostPeriodLabel(k)} ${n}건 · ${fmtW(p)}</span>`;});}
  let bodyHTML='';
  if(!totalN){bodyHTML=`<div class="lost-empty">선택한 기간 내 이탈 계약이 없습니다</div>`;}
  else{
    activePeriods.forEach((k,ki)=>{
      const contracts=L[k];if(!contracts||!contracts.length)return;
      const pt=contracts.reduce((s,x)=>s+x.first_perf,0);
      const st=LOST_CHIP[k]||'background:#f1efe8;color:#444441';
      bodyHTML+=`<div class="lost-period-block${ki>0?' lost-period-block--sep':''}"><div class="lost-ph"><span class="pchip" style="${st}">${lostPeriodLabel(k)}</span><span class="psub">${contracts.length}건 · ${fmtW(pt)} 소멸</span></div>`;
      bodyHTML+=`<table class="lt"><thead><tr><th style="width:24px">#</th><th>계약자 / 보험사</th><th>상품명</th><th>상태</th><th>가입일</th><th>해지일</th><th>최종납입</th><th class="amt">최초실적</th></tr></thead><tbody>`;
      contracts.forEach((x,i)=>{
        const sb=x.curr_status==='실효'?`<span class="st-eff">실효</span>`:`<span class="st-can">해지</span>`;
        const prod=x.product.length>18?x.product.slice(0,18)+'…':x.product;
        bodyHTML+=`<tr><td style="color:#73726c;text-align:center">${i+1}</td><td><strong>${x.holder}</strong><div class="pr">${x.insurer}</div></td><td>${prod}</td><td>${sb}</td><td style="font-size:10px;color:#5f5e5a;white-space:nowrap">${x.start_date||'—'}</td><td style="font-size:10px;white-space:nowrap;color:${x.cancel_date?'#854f0b':'#73726c'}">${x.cancel_date||'—'}</td><td>${riskBadge(x.paid_round,x.curr_status)}</td><td class="amt" style="color:#a32d2d;font-weight:500">${fmtW(x.first_perf)}</td></tr>`;
      });
      bodyHTML+=`</tbody></table></div>`;
    });
  }
  return`<div class="lost-hd"><div class="lost-title"><span class="dot" style="background:${totalN?'#e24b4a':'#c0bfba'}"></span>이탈 계약 상세</div><div class="lost-chips">${chips}</div></div><div class="lost-bd">${bodyHTML}</div>`;
}

lled')" class="${rankSortCol==='cancelled'?'asc':''}">해지<span class="si2">↕</span></th><th onclick="sortRank('lost')" class="${rankSortCol==='lost'?'asc':''}">이탈건<span class="si2">↕</span></th><th onclick="sortRank('act')" class="${rankSortCol==='act'?'asc':''}">활동량<span class="si2">↕</span></th>

function rankSort(agents){
  return[...agents].sort((a,b)=>{
    const d=rankSortDir==='desc'?1:-1;
    if(rankSortCol==='name')return a.name.localeCompare(b.name,'ko')*(rankSortDir==='asc'?1:-1);
    if(rankSortCol==='rate')return((lr(b)??-1)-(lr(a)??-1))*d;
    if(rankSortCol==='chg')return((chg(b)??-999)-(chg(a)??-999))*d;
    if(rankSortCol==='cnt')return((lmd(b).total_contracts||0)-(lmd(a).total_contracts||0))*d;
    if(rankSortCol==='lapsed')return((lmd(b).lapsed||0)-(lmd(a).lapsed||0))*d;
    if(rankSortCol==='cancelled')return((lmd(b).cancelled||0)-(lmd(a).cancelled||0))*d;
    if(rankSortCol==='lost')return(totalLostN(b.name)-totalLostN(a.name))*d;
    if(rankSortCol==='act')return((actOfMths(b.name)?.cnt||0)-(actOfMths(a.name)?.cnt||0))*d;
    if(rankSortCol==='lostperf')return(totalLostPerf(b.name)-totalLostPerf(a.name))*d;
    if(rankSortCol.startsWith('m')){const m=rankSortCol.slice(1);return((b.months[m]?.rate_25??-1)-(a.months[m]?.rate_25??-1))*d;}
    return 0;
  });
}
function sortRank(col){
  if(rankSortCol===col)rankSortDir=rankSortDir==='desc'?'asc':'desc';
  else{rankSortCol=col;rankSortDir='desc';}
  if(viewMode==='perf'){renderPerfView(sortedFiltered());}
}
function perfSort(col){
  if(perfSortCol===col)perfSortDir=perfSortDir==='desc'?'asc':'desc';
  else{perfSortCol=col;perfSortDir='desc';}
  if(viewMode==='perf'){renderPerfView(sortedFiltered());}
}

    document.getElementById('perfViewArea').style.display='none';
    const grid=document.getElementById('grid'),empty=document.getElementById('emptyMsg');
    if(!agents.length||!actMths().length){grid.innerHTML='';empty.style.display='block';return;}
    empty.style.display='none';
    grid.innerHTML=agents.map(d=>cardHTML(d)).join('');
    setTimeout(()=>{agents.forEach(d=>{drawCharts(d);drawPerfCharts(d);});},60);
  }else{
    document.getElementById('cardViewArea').style.display='none';
    document.getElementById('perfViewArea').style.display='';
    renderPerfView(agents);
  }
}

// 활동량 데이터 로드 (Notion MCP + Anthropic API)
// ═══════════════════════════════════════════
function actOfMths(name) {
  if(!ACT[name]) return null;
  const aM=actMths();
  const cnt=aM.reduce((s,m)=>s+(ACT[name][m]||0),0);
  return {cnt, months: ACT[name]};
}

async function loadActivityData() {
  const btn=document.getElementById('actBtn');
  btn.textContent='⏳ 로딩...';btn.disabled=true;
  
  // FA 이름 목록 (D 기준)
  const faList=Object.keys(D).join(', ');
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        mcp_servers: [{type:'url', url:'https://mcp.notion.com/mcp', name:'notion'}],
        system: '데이터 집계 전문가. 반드시 순수 JSON 형식으로만 응답. 설명이나 마크다운 없이 JSON 객체만.',
        messages: [{role:'user', content:`Notion 데이터베이스 collection://204d589b-33cd-49b5-b37f-d4cec43ecb85 (피드백 요청)에서 다음 조건으로 월별 활동량을 집계해주세요.

집계 조건:
1. date:고객미팅일:start가 2025-10-01 ~ 2026-03-31 사이에 있는 레코드만
2. 상태 속성("")이 "작성中(임시)" 인 레코드는 제외
3. 상담FA 속성 기준으로 집계 (사람 이름으로)

아래 FA들에 대해 집계: ${faList}

반드시 아래 형식 JSON만 응답 (다른 텍스트 없이):
{"FA이름":{"10":건수,"11":건수,"12":건수,"01":건수,"02":건수,"03":건수}}`}]
      })
    });
    
    const data = await res.json();
    
    // 텍스트 블록 추출
    const textContent = data.content
      .filter(b=>b.type==='text')
      .map(b=>b.text)
      .join('');
    
    // JSON 파싱
    const jsonMatch = textContent.match(/\{[\s\S]+\}/);
    if(jsonMatch) {
      const parsed = JSON.parse(jsonMatch[0]);
      ACT = parsed;
      render();
      btn.textContent='✅ 활동량 로드 완료';
      btn.style.background='rgba(30,158,117,.3)';
    } else {
      throw new Error('JSON 파싱 실패: '+textContent.slice(0,100));
    }
    
  } catch(e) {
    console.error('활동량 로드 오류:', e);
    btn.textContent='❌ 재시도';
    btn.disabled=false;
    btn.style.background='rgba(224,75,74,.2)';
  }
}

function downloadHtml(){
  const btn=document.getElementById('dlHtmlBtn');
  btn.textContent='⏳ 생성 중...';

  const agents=sortedFiltered();
  // 필터된 에이전트만 포함한 D, LOST, PERF, TARGET
  const fD={},fL={},fP={},fT={};
  agents.forEach(d=>{
    if(D[d.name]) fD[d.name]=D[d.name];
    if(LOST&&LOST[d.name])fL[d.name]=LOST[d.name];
    if(PERF&&PERF[d.name])fP[d.name]=PERF[d.name];
    if(TARGET&&TARGET[d.name])fT[d.name]=TARGET[d.name];
  });

  // 현재 페이지 HTML 가져오기
  let h='<!DOCTYPE html>\n'+document.documentElement.outerHTML;

  // 초기 상태 인라인화 (fetch 블록 제거 + 직접 데이터 할당)
  const aNJ=JSON.stringify(agents.map(d=>d.name));
  const aMJ=JSON.stringify([...selMonths]);
  const cT=JSON.stringify(curTeam);
  const cS=JSON.stringify(curStatus);
  const actJ=JSON.stringify(ACT);
  const inlineInit=`(function(){
    D=${JSON.stringify(fD)};
    LOST=${JSON.stringify(fL)};
    PERF=${JSON.stringify(fP)};
    TARGET=${JSON.stringify(fT)};
    ensureDPlaceholders();
    AVAIL_MONTHS=[...new Set([
      ...Object.values(D).flatMap(d=>Object.keys(d.months||{})),
      ...Object.values(PERF||{}).flatMap(p=>Object.keys(p.months||{}))
    ])].sort((a,b)=>(MONTH_ORDER[a]??99)-(MONTH_ORDER[b]??99));
    selMonths=new Set(${aMJ});
    sel=new Set(${aNJ});
    curTeam=${cT};
    curStatus=${cS};
    ACT=${actJ};
    buildTeams();buildPills();buildMonthBtns();
    setStatus(${cS});
  })();`;

  // fetch 블록을 인라인 init으로 교체
  const fS=h.indexOf("fetch('./data/data.json");
  if(fS>=0){
    const fE=h.indexOf('});',fS)+3;
    h=h.slice(0,fS)+inlineInit+h.slice(fE);
  }

  // 다운로드
  const blob=new Blob([h],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const tl=curTeam!=='전체'?curTeam+'_':'';
  const period=actMths().map(m=>ML_MAP[m]).join('_');
  a.download=`유지율대시보드_${tl}${period}.html`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  btn.textContent='↓ HTML 저장';
}

async function downloadEach(){
  if(viewMode!=='card'){alert('카드 뷰에서만 사용 가능합니다');return;}
  const btn=document.getElementById('dlEachBtn');
  btn.textContent='⏳ 캡처 중...';btn.disabled=true;
  const cards=document.querySelectorAll('#grid .card');
  if(!cards.length){btn.textContent='↓ 개별 이미지';btn.disabled=false;return;}
  const period=actMths().map(m=>ML_MAP[m]).join('_');
  for(let i=0;i<cards.length;i++){
    const card=cards[i];
    const name=card.querySelector('.cname')?.textContent||('FA_'+(i+1));
    btn.textContent=`⏳ ${i+1}/${cards.length} ${name}`;
    try{
      const canvas=await html2canvas(card,{scale:2,backgroundColor:'#fff',useCORS:true,logging:false});
      const a=document.createElement('a');
      a.download=`${name}_유지율분석_${period}.png`;
      a.href=canvas.toDataURL('image/png');
      a.click();
      await new Promise(r=>setTimeout(r,300));
    }catch(e){console.error('캡처 실패:',name,e);}
  }
  btn.textContent='✅ 완료';btn.disabled=false;
  setTimeout(()=>{btn.textContent='↓ 개별 이미지';},2000);
}
